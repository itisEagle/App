<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="index.html">GiftStore</a></div>
            <div class="nav-links">
                <div class="cart-icon" onclick="window.location.href='cart.html'">
                     <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm7 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-8-4l-3-15h-3m18 3l-2 10h-13l-1.5-7.5h16.5z"></path></svg>
                    <span class="badge" id="cart-count">0</span>
                </div>
                <button id="auth-btn" class="btn btn-sm">Login</button>
            </div>
        </div>
    </nav>

    <div class="container" id="p-detail-container" style="margin-top:40px;">
        <div class="product-layout">
            <div>
                <img id="p-img" class="p-large-img" src="" alt="Product Image">
            </div>
            
            <div class="p-info-box">
                <small style="text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700;">Digital Code</small>
                <h1 id="p-title" style="font-size: 2rem; margin: 5px 0 15px;">Loading...</h1>
                
                <h2 id="p-price" style="color:var(--primary); font-size: 2.2rem; margin-bottom: 20px;"></h2>
                
                <!-- Variant Selector -->
                <div class="input-group">
                    <label>Select Package:</label>
                    <select id="p-variant"></select>
                </div>

                <div id="custom-fields"></div>
                
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button id="add-cart-btn" class="btn btn-outline" style="flex:1;">Add to Cart</button>
                    <button id="buy-now-btn" class="btn" style="flex:1;">Buy Now</button>
                </div>

                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border);">
                    <h3 style="font-size: 1.1rem; margin-bottom: 10px;">Description</h3>
                    <p id="p-desc" style="color: var(--text-muted);"></p>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
