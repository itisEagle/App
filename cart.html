<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="index.html">GiftStore</a></div>
            <div class="nav-links"><button id="auth-btn" class="btn btn-sm">Login</button></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px; max-width: 800px;">
        <h1 style="margin-bottom: 20px;">Your Cart</h1>
        <div id="cart-items"></div>
        
        <div class="checkout-summary" style="margin-top:30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="color: var(--text-muted);">Total:</span>
                <span id="cart-total" style="font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-left: 10px;">$0</span>
            </div>
            <a href="checkout.html" class="btn">Proceed to Checkout</a>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
